version: "3.9"

services:
  orchestrator:
    build:
      context: ..
      dockerfile: docker/Dockerfile.server   # Reuse the image
    container_name: orchestrator
    # command: ["python", "-u", "orchestrator/orch_service.py"]
    # Start in module mode to automatically resolve package path issues
    command: ["python", "-u", "-m", "orchestrator.orch_service"]
    ports:
      - "7070:7070"
    
    # ================= Add this section =================
    volumes:
      # This means mapping the "../outputs" directory on the host machine to "/app/outputs" inside the container.
      - ../outputs:/app/outputs
      - ../data:/app/data
    # ================================================
    environment:
      OUT_DIR: outputs
      PYTHONPATH: /app   # <--- Note: A colon should be used here, followed by a space.

      PARTITION_SCHEME: dirichlet
      DIRICHLET_ALPHA: 0.3
      DATA_DIR: /app/data


      # Veins side
      VEINS_MODE: rpc           # mock | rpc
      VEINS_HOST: 172.17.0.1    # Linux host gateway (Veins runs on host)
      VEINS_PORT: 10001

      # scenario params (must match your Veins/SUMO)
      MAP_SIZE_M: 2500
      NUM_VEH: 100

      # RSU_X_M: 2000
      # RSU_Y_M: 2000
      # RSU_R_M: 3000

      # The RSU coordinates must be consistent with *.rsu[0].mobility.x/y in omnetpp.ini
      RSU_X_M: 1250
      RSU_Y_M: 1250
      RSU_R_M: 2000

      # FL params
      ROUNDS: 30
      M: 10
      DEADLINE_S: 25
      MODEL_DOWN_BYTES: 2000000
      MODEL_UP_BYTES: 2000000

      # carbon/radio
      CI_G_PER_KWH: 153.0
      P_RX_W: 1.0
      P_TX_W: 1.5

      CI_MODE: electricitymaps # fixed | electricitymaps Specify it here; there is no need to specify it manually in orch_core.py
      ELECTRICITYMAPS_TOKEN: "eyEFSfkLXrarj0rSMNRn"  # It is recommended to add quotation marks to prevent special characters in the Token.
      ELECTRICITYMAPS_ZONE: ES
      CI_CACHE_S: 300

      # DATASET: fashionmnist
      # DATASET_TRAIN_SIZE: 60000  # The size of the FashionMNIST training set is 60,000

      DATASET: cifar10
      DATASET_TRAIN_SIZE: 50000

      # cifar10=50000 / fashionmnist=60000
      ALLOW_DOWNLOAD: 1          # It is recommended to enable this function to prevent the dataset from not being pre-downloaded in the container.
      

  fl_server:
    build:
      context: ..
      dockerfile: docker/Dockerfile.server
    container_name: fl_server
    depends_on: [orchestrator]
    ports:
      - "8080:8080"
    environment:
      SERVER_ADDR: 0.0.0.0:8080
      ROUNDS: 30
      ORCH_URL: http://orchestrator:7070
      MIN_AVAILABLE_CLIENTS: 1
      MIN_FIT_CLIENTS: 1

      # DATASET: fashionmnist
      DATASET: cifar10
      ALLOW_DOWNLOAD: 1          # It is recommended to enable this function to prevent the dataset from not being pre-downloaded inside the container.

    volumes:
      # - ../outputs:/app/outputs:ro
      - ../outputs:/app/outputs
      - ../data:/app/data:ro

  fl_client:
    build:
      context: ..
      dockerfile: docker/Dockerfile.client
    depends_on: [fl_server]

    environment:
      SERVER_ADDR: fl_server:8080
      P_COMP_W: 18
      CI_G_PER_KWH: 153.0
      SLEEP_SCALE: 0.10

      # DATASET: fashionmnist
      DATASET: cifar10
      ALLOW_DOWNLOAD: 1          # It is recommended to enable this function to prevent the dataset from not being pre-downloaded inside the container.

      # DATASET: cifar10
      # DATA_DIR: /app/data
      # NUM_VEH: 100
      # SEED: 42
      # PARTITION_MODE: iid
      # PARTITION_PATH: /app/outputs/partitions/cifar10_N100_seed42_iid.json
      # BATCH_SIZE: 64
      # EPOCHS: 1
      # LR: 0.01

    volumes:
      - ../outputs:/app/outputs:ro
      - ../data:/app/data

